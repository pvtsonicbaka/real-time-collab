apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: collabdocs-ingress
  namespace: collabdocs
  annotations:
    # enable nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    # WebSocket support for Socket.io
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # body size for document content
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  rules:
    - host: collabdocs.local   # change to your domain in production
      http:
        paths:
          # API routes → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Socket.io → backend
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Swagger docs → backend
          - path: /api-docs
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # Everything else → frontend SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
